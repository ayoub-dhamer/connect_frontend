<div class="result-page">

  <div class="result-box cancel-box">

    <div class="icon">❌</div>

    <h1>Payment Cancelled</h1>

    <p>No worries — your payment was not processed.</p>

    <div class="actions">
      <button
        mat-raised-button
        color="warn"
        (click)="router.navigate(['/payment'])">
        Try Again
      </button>

      <button
        mat-stroked-button
        (click)="router.navigate(['/user'])">
        Back to Dashboard
      </button>
    </div>

  </div>

</div>
