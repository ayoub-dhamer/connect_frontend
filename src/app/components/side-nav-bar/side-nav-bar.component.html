<div class="sidebar" [class.collapsed]="!isExpanded" [dir]="'dir' | translate">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-icon">
      <img src="assets/img/app-logo.png" alt="Logo" class="logo-img-icon" />
    </div>
    <span class="logo-text" *ngIf="isExpanded">
      <img src="assets/img/app-name.png" alt="App Name" class="logo-img-full" />
    </span>
  </div>

  <div class="divider"></div>

  <!-- Nav section -->
  <nav class="nav-section">
    <span class="section-label" *ngIf="isExpanded">{{
      "adminSection" | translate
    }}</span>

    <ng-container *ngFor="let item of menu">
      <a
        *ngIf="canShow(item)"
        class="nav-item"
        routerLinkActive="nav-item--active"
        [routerLink]="item.link"
        [routerLinkActiveOptions]="{ exact: true }"
        [matTooltip]="!isExpanded ? (item.label | translate) : ''"
        matTooltipPosition="right"
      >
        <span class="nav-icon-wrap">
          <mat-icon>{{ item.icon }}</mat-icon>
        </span>
        <span class="nav-label" *ngIf="isExpanded">{{
          item.label | translate
        }}</span>
        <span class="nav-badge" *ngIf="isExpanded && item.badge">{{
          item.badge
        }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- Bottom area -->
  <div class="bottom-area">
    <div class="divider"></div>

    <!-- Language switcher -->
    <div class="lang-wrapper">
      <div
        class="lang-row"
        [class.lang-row--collapsed]="!isExpanded"
        (click)="langOpen = !langOpen"
      >
        <div class="lang-flag">
          {{ currentLang === "en" ? "🇬🇧" : "🇫🇷" }}
        </div>
        <div class="lang-info" *ngIf="isExpanded">
          <span class="lang-name">{{
            currentLang === "en" ? "English" : "Français"
          }}</span>
          <span class="lang-sub">{{ currentLang | uppercase }} · Language</span>
        </div>
        <mat-icon
          class="lang-chevron"
          *ngIf="isExpanded"
          [class.open]="langOpen"
          >expand_more</mat-icon
        >
      </div>

      <!-- Always in DOM — shown/hidden purely via CSS to avoid flicker -->
      <div class="lang-dropdown" [class.lang-dropdown--open]="langOpen">
        <div
          class="lang-option"
          [class.lang-option--active]="currentLang === 'en'"
          (click)="switchLang('en')"
        >
          <span class="lang-option-flag">🇬🇧</span>
          <span class="lang-option-name">English</span>
          <mat-icon class="lang-option-check" *ngIf="currentLang === 'en'"
            >check</mat-icon
          >
        </div>
        <div
          class="lang-option"
          [class.lang-option--active]="currentLang === 'fr'"
          (click)="switchLang('fr')"
        >
          <span class="lang-option-flag">🇫🇷</span>
          <span class="lang-option-name">Français</span>
          <mat-icon class="lang-option-check" *ngIf="currentLang === 'fr'"
            >check</mat-icon
          >
        </div>
      </div>
    </div>
  </div>
</div>
