<div class="modal-overlay" *ngIf="isOpen" (mousedown)="onOverlayClick($event)">
  <div class="modal">
    <div class="modal-head">
      <h3>{{ isEditMode ? "Edit task" : "New task" }}</h3>
      <button
        type="button"
        class="modal-close"
        (click)="cancel()"
        aria-label="Close"
      >
        ✕
      </button>
    </div>

    <div class="field" [class.has-error]="nameInvalid">
      <label class="field-label" for="task-name">Task name</label>
      <input
        type="text"
        id="task-name"
        [(ngModel)]="name"
        (blur)="nameTouched = true"
        placeholder="Design login screen"
      />
      <div class="error-text">Enter a name with at least 3 characters.</div>
    </div>

    <div class="field">
      <label class="field-label">Priority</label>
      <div class="pill-group">
        <div
          *ngFor="let p of priorities"
          class="pill"
          [class.is-selected]="priority === p.value"
          (click)="selectPriority(p.value)"
        >
          {{ p.label }}
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Status</label>
      <div class="pill-group">
        <div
          *ngFor="let s of statuses"
          class="pill"
          [class.is-selected]="status === s.value"
          (click)="selectStatus(s.value)"
        >
          {{ s.label }}
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Assign participants</label>

      <div class="member-pick-list" *ngIf="participants.length > 0">
        <div
          *ngFor="let p of participants"
          class="member-pick"
          [class.is-selected]="isMemberSelected(p.id)"
          (click)="toggleMember(p.id)"
        >
          <span class="member-pick-check">{{
            isMemberSelected(p.id) ? "✓" : ""
          }}</span>
          <span class="chip-avatar">{{
            p.name | slice: 0 : 2 | uppercase
          }}</span>
          <span>{{ p.name }}</span>
        </div>
      </div>

      <div class="summary-empty" *ngIf="participants.length === 0">
        No participants yet — add them in step 2, or assign this task later.
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" (click)="cancel()">
        Cancel
      </button>
      <button type="button" class="btn btn-primary" (click)="submit()">
        {{ isEditMode ? "Save changes" : "Add task" }}
      </button>
    </div>
  </div>
</div>
