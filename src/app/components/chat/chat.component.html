<div class="chat-layout">
  <!-- User list sidebar -->
  <div class="user-list">
    <h2>Contacts</h2>

    <div
      *ngFor="let u of users"
      class="user-item"
      [class.active]="selectedUser?.id === u.id"
      (click)="selectUser(u)"
    >
      <img [src]="u.pictureUrl || 'assets/img/user.jpg'" class="avatar" />
      <span>{{ u.name }}</span>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area">
    <div class="chat-header" *ngIf="selectedUser">
      <div class="chat-header-info">
        <img
          [src]="selectedUser.pictureUrl || 'assets/img/user.jpg'"
          class="avatar"
        />
        <span>{{ selectedUser.name }}</span>
      </div>

      <div class="chat-header-actions">
        <button
          class="call-btn"
          (click)="startCall('audio')"
          title="Audio call"
        >
          <mat-icon>call</mat-icon>
        </button>
        <button
          class="call-btn"
          (click)="startCall('video')"
          title="Video call"
        >
          <mat-icon>videocam</mat-icon>
        </button>
      </div>
    </div>

    <div class="chat-header empty" *ngIf="!selectedUser">
      Select a contact to start chatting
    </div>

    <div class="messages" #messageContainer>
      <div
        *ngFor="let m of messages"
        class="message"
        [class.mine]="m.senderEmail === currentUserEmail"
      >
        <div class="bubble">{{ m.content }}</div>
        <span class="time">
          {{ m.timestamp | date: "shortTime" }}
        </span>
      </div>
    </div>

    <div class="input-row" *ngIf="selectedUser">
      <input
        [(ngModel)]="newMessage"
        placeholder="Type a message..."
        (keyup.enter)="send()"
        class="msg-input"
      />
      <button
        mat-icon-button
        color="primary"
        (click)="send()"
        [disabled]="!newMessage.trim()"
      >
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
</div>

<!-- Incoming call modal -->
<div class="call-backdrop" *ngIf="incomingCall"></div>
<div class="call-modal" *ngIf="incomingCall">
  <div class="call-modal-icon">
    <mat-icon>{{
      incomingCall.type === "video" ? "videocam" : "call"
    }}</mat-icon>
  </div>
  <div class="call-modal-title">{{ incomingCall.callerName }}</div>
  <div class="call-modal-sub">
    Incoming {{ incomingCall.type === "video" ? "video" : "audio" }} call…
  </div>
  <div class="call-modal-actions">
    <button class="call-decline" (click)="declineCall()">
      <mat-icon>call_end</mat-icon>
    </button>
    <button class="call-accept" (click)="acceptCall()">
      <mat-icon>call</mat-icon>
    </button>
  </div>
</div>
