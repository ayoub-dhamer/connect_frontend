<div class="list-page">

  <div class="list-header">
    <h1>Users</h1>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <mat-table [dataSource]="users" class="mat-elevation-z2">

    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
      <mat-cell *matCellDef="let u">
        <img
          [src]="u.pictureUrl || 'assets/img/user.jpg'"
          class="avatar" />
        {{ u.name }}
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="email">
      <mat-header-cell *matHeaderCellDef>Email</mat-header-cell>
      <mat-cell *matCellDef="let u">{{ u.email }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="roles">
      <mat-header-cell *matHeaderCellDef>Roles</mat-header-cell>
      <mat-cell *matCellDef="let u">
        <mat-chip *ngFor="let r of u.roles" selected>
          {{ r }}
        </mat-chip>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="subscription">
      <mat-header-cell *matHeaderCellDef>Subscription</mat-header-cell>
      <mat-cell *matCellDef="let u">
        <mat-chip
          [color]="u.subscriptionStatus === 'ACTIVE' ? 'primary' : 'warn'"
          selected>
          {{ u.subscriptionStatus }}
        </mat-chip>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let u">
        <button
          mat-icon-button
          color="warn"
          (click)="delete(u.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: columns"></mat-row>

  </mat-table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)">
  </mat-paginator>

</div>
