<div class="video-page">
  <div class="room-header">
    <h2>
      Room: {{ roomId }}
      <span class="call-type-tag">{{
        callType === "video" ? "Video" : "Audio"
      }}</span>
    </h2>

    <div class="controls">
      <button
        mat-icon-button
        (click)="toggleMic()"
        [color]="micOn ? 'primary' : 'warn'"
      >
        <mat-icon>{{ micOn ? "mic" : "mic_off" }}</mat-icon>
      </button>

      <button
        mat-icon-button
        *ngIf="callType === 'video'"
        (click)="toggleCam()"
        [color]="camOn ? 'primary' : 'warn'"
      >
        <mat-icon>{{ camOn ? "videocam" : "videocam_off" }}</mat-icon>
      </button>

      <button mat-raised-button color="warn" (click)="hangUp()">
        <mat-icon>call_end</mat-icon>
        Leave
      </button>
    </div>
  </div>

  <!-- Video grid -->
  <div class="video-grid" *ngIf="callType === 'video'">
    <div class="video-tile">
      <video #localVideo autoplay muted playsinline></video>
      <span class="label">You</span>
    </div>
    <div class="video-tile" *ngFor="let peer of remotePeers">
      <video
        [srcObject]="peer.stream"
        [muted]="peer.muted"
        autoplay
        playsinline
      ></video>
      <span class="label">{{ peer.id }}</span>
      <button
        class="unmute-overlay"
        *ngIf="peer.muted"
        (click)="unmutePeer(peer.id)"
      >
        <mat-icon>volume_off</mat-icon>
        <span>Tap to unmute</span>
      </button>
    </div>
  </div>

  <!-- Audio-only view -->
  <div class="audio-grid" *ngIf="callType === 'audio'">
    <div class="audio-tile">
      <div class="audio-avatar">You</div>
    </div>
    <div class="audio-tile" *ngFor="let peer of remotePeers">
      <div class="audio-avatar">{{ peer.id }}</div>
      <audio [srcObject]="peer.stream" [muted]="peer.muted" autoplay></audio>
      <button
        class="unmute-overlay audio-unmute"
        *ngIf="peer.muted"
        (click)="unmutePeer(peer.id)"
      >
        <mat-icon>volume_off</mat-icon>
        <span>Tap to unmute</span>
      </button>
    </div>
  </div>
</div>
